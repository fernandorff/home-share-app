# Keep-warm ping (BL-15): hits /api/health?db=1 every 5 minutes so neither the Vercel serverless
# function nor the Neon compute go cold — the ~7.8s white screen only happened on cold starts.
# GitHub's cron can lag a few minutes under load; that's fine, Neon's idle-suspend window is 5min
# and an occasional cold hit just means one slower first paint.
name: keep-warm

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping app + database
        run: |
          curl -sS --max-time 30 -w "\nHTTP %{http_code} in %{time_total}s\n" \
            "https://homeshare.fernandorffdev.com/api/health?db=1"
